<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – El Tornillo</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="login-page">
  <div class="login-card">
    <h1>Ferretería <span class="accent">El Tornillo</span></h1>
    <p>Ingresá tus credenciales para continuar</p>

    <div class="form-group">
      <label>Usuario</label>
      <input type="text" id="usuario" placeholder="usuario_login" autocomplete="username">
    </div>
    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn btn-primary" style="width:100%" onclick="login()">Ingresar</button>
    <p class="login-error" id="loginError">Usuario o contraseña incorrectos.</p>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    async function login() {
      const usuarioLogin = document.getElementById('usuario').value.trim();
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('loginError');
      errorEl.style.display = 'none';

      try {
        const usuario = await api.login({ usuarioLogin, password });
        setUsuario(usuario);
        window.location.href = '/pages/productos.html';
      } catch {
        errorEl.style.display = 'block';
      }
    }

    // Login con Enter
    document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
  </script>
</body>
</html>
